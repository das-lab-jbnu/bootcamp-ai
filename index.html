<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="K-방산에 적응하는 AI 인재 양성 부트캠프 사업" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="전북대학교 방산AI부트캠프" />
    <meta property="og:title" content="전북대학교 방산AI부트캠프" />
    <meta property="og:description" content="K-방산에 적응하는 AI 인재 양성 부트캠프 사업" />
    <meta property="og:url" content="https://das.jbnu.ac.kr/bootcamp-ai/index.html" />
    <meta property="og:image" content="https://das.jbnu.ac.kr/bootcamp-ai/assets/images/hero-robot-robot.jpg?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="전북대학교 방산AI부트캠프" />
    <meta name="twitter:description" content="K-방산에 적응하는 AI 인재 양성 부트캠프 사업" />
    <meta name="twitter:image" content="https://das.jbnu.ac.kr/bootcamp-ai/assets/images/hero-robot-robot.jpg?v=2" />
    <title>전북대 방산 AI 부트캠프</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./assets/js/version.js"></script>
    <script src="./assets/js/asset-loader.js"></script>
    <script>
      loadBootcampAssets({ basePath: "./", loadData: true });
    </script>
  </head>
  <body>
    <div class="page-wrap">
      <header id="site-header"></header>
      <main>
        <section class="hero-gradient hero-dynamic text-white">
          <div class="max-w-6xl mx-auto px-4 py-16 md:py-20">
            <div class="inline-block rounded-full border border-blue-200/40 px-5 py-2 text-sm md:text-lg font-semibold text-blue-100">
              첨단산업 인재양성 부트캠프(AI)
            </div>
            <h1 id="hero-message" class="mt-4 text-2xl md:text-5xl font-bold tracking-tight"></h1>
            <p class="mt-10 text-center text-xl md:text-3xl font-extrabold text-blue-100">미래방산 발전방향 · 현장 목소리</p>
            <div id="voice-list" class="mt-6 grid gap-4 md:grid-cols-2"></div>
            <p class="mt-10 text-center text-2xl md:text-4xl font-black text-white">방산 AI 융합 인재상</p>
            <div id="talent-list" class="mt-6 grid gap-4 md:grid-cols-3"></div>
            <div id="track-chip-list" class="mt-8 grid gap-3 md:grid-cols-4"></div>
            <p id="vision-text" class="mt-8 text-center text-blue-100"></p>
          </div>
        </section>
      </main>
      <footer id="site-footer"></footer>
    </div>

    <script>
      const data = window.BOOTCAMP_DATA;
      document.getElementById("hero-message").textContent = data.heroMessage;
      document.getElementById("vision-text").textContent = data.vision;

      renderCards(
        "voice-list",
        data.futureVoices,
        (voice) => `
          <article class="rounded-2xl border border-slate-200/70 bg-white/95 p-5 text-slate-900 shadow-lg">
            <h3 class="text-lg font-extrabold">${voice.title}</h3>
            <p class="mt-2 text-sm text-slate-600">${voice.desc}</p>
          </article>
        `
      );

      renderCards(
        "talent-list",
        data.talentProfiles,
        (talent) => `
          <article class="rounded-2xl border border-blue-300/40 bg-blue-700/95 p-6 text-white shadow-xl">
            <h3 class="text-2xl font-black tracking-tight">[${talent.type}]</h3>
            <p class="mt-3 text-sm text-blue-100">${talent.desc}</p>
          </article>
        `
      );

      renderCards(
        "track-chip-list",
        data.tracks,
        (track) =>
          `<article class="rounded-full border border-blue-300/40 bg-blue-800/80 py-3 text-center font-semibold text-white shadow">${track.name.replace(
            " Track",
            ""
          )}</article>`
      );

      renderCards(
        "track-list",
        data.tracks,
        (track) => `
          <article class="card p-5">
            <h3 class="font-semibold text-slate-900">${track.name}</h3>
            <p class="mt-2 text-sm text-slate-600">${track.desc}</p>
          </article>
        `
      );
    </script>
  </body>
</html>
