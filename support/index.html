<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 지원 혜택 | 전북대 방산 AI 부트캠프</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header id="site-header"></header>
      <main class="max-w-6xl mx-auto px-4 py-12">
        <h1 class="section-title text-3xl font-bold">학생 지원 혜택</h1>
        <div class="mt-8 grid gap-4 md:grid-cols-2">
          <article class="card p-6">
            <h2 class="font-semibold text-slate-900">모집 및 선발</h2>
            <p class="mt-2 text-sm text-slate-700">전공/융합전공 학생 대상 단계별 모집 및 트랙 맞춤형 선발 운영</p>
          </article>
          <article class="card p-6">
            <h2 class="font-semibold text-slate-900">이수 혜택</h2>
            <p class="mt-2 text-sm text-slate-700">마이크로디그리 연계, 프로젝트 수행, 현장실습 및 취업 매칭 지원</p>
          </article>
          <article class="card p-6">
            <h2 class="font-semibold text-slate-900">장학 및 학업 장려</h2>
            <p class="mt-2 text-sm text-slate-700">우수학생 장학금 및 학업장려금 확대를 통한 참여 유인 강화</p>
          </article>
          <article class="card p-6">
            <h2 class="font-semibold text-slate-900">취업지원</h2>
            <p class="mt-2 text-sm text-slate-700">책임지도 교수제와 기업 협업 프로젝트 기반 취업 코칭 운영</p>
          </article>
        </div>
      </main>
      <footer id="site-footer"></footer>
    </div>
    <script src="../assets/js/common.js"></script>
  </body>
</html>
