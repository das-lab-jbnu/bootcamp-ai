<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교육과정 | 전북대 방산 AI 부트캠프</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/version.js"></script>
    <script src="../assets/js/asset-loader.js"></script>
    <script>
      loadBootcampAssets({ basePath: "../", loadData: false });
    </script>
  </head>
  <body>
    <div class="page-wrap">
      <header id="site-header"></header>
      <main class="max-w-6xl mx-auto px-4 py-12">
        <h1 class="section-title text-3xl font-bold">교육과정</h1>

        <section class="mt-8">
          <div id="curriculum-tabs" class="flex flex-wrap gap-2"></div>
          <div id="curriculum-content" class="mt-5"></div>
        </section>
      </main>
      <footer id="site-footer"></footer>
    </div>
    <script>
      const curriculumData = {
        overview: {
          stageSummary: [
            {
              stage: "초급(공통)",
              desc: "교과형 프로그램 1개"
            },
            {
              stage: "초급 과정",
              desc: "방산 AI 입문-몰입형(세부 3과목, 3학점 45시간/6학점 75시간) + 방산AI 입문-교과형(세부 2과목, 3학점 48시간)"
            },
            {
              stage: "중급 과정",
              desc: "AI융합 마이크로디그리 이수 기준(초급 6 + 중급 6 = 12학점), 프로그램 4개 / 세부 총 8과목"
            },
            {
              stage: "고급 과정",
              desc: "AI융합 마이크로디그리 이수 + 중/고급 선택 9학점(몰입형 최소 1개), 프로그램 4개 / 세부 총 8과목"
            }
          ],
          commonCourses: [
            "방위산업기초: 단기집중교육(협업기관특강) · 단기집중교육(교내특강) · 전문가초청세미나(참여기업전문가)",
            "방산AI 입문 - 몰입형: 생성형 AI와 LLM의 이해와 활용 · AI와 머신러닝 활용 데이터 시각화 과정 · AI 활용 국방사업관리 I, II",
            "방산AI 입문 - 교과형: Python 프로그래밍 입문 및 실습 · 방산 사이버보안 기초",
            "방산 AI 융합 - 교과형: 방산유무인체계특론 · 방산 수치해석 및 소재 시뮬레이션 · 방산AI융합특론"
          ],
          introTracks: [
            "자율이동체계 Track",
            "방산경영 · MRO Track",
            "군수 AX 전환 Track",
            "사이버보안 Track"
          ]
        },
        tracks: [
          {
            key: "autonomous",
            tab: "Track 1: 자율이동체계",
            subtitle: "유무인 복합체계 · 지능형 로봇 중심",
            beginner: ["방산AI 입문(교과형/몰입형)"],
            intermediate: ["방산개방형아키텍처(MOSA SDx) 실습", "자율시스템과 협업제어", "지능형 로봇 설계", "방산제어시스템", "AI 기반 워게임"],
            advanced: ["자율임무 SW 검증", "로봇/드론 시험", "방산기업현장실습"]
          },
          {
            key: "mro",
            tab: "Track 2: 방산경영 · MRO",
            subtitle: "데이터 기반 경영분석 · MRO 실무",
            beginner: ["방산AI 입문(교과형/몰입형)"],
            intermediate: [
              "데이터분석 및 머신러닝을 통한 방산 경영 분석",
              "데이터 분석 및 AI 모델링 구현 과정",
              "AI기반 방산기술경영개론",
              "AI기반 방산생산운영관리",
              "AI기반 국제방산협력",
              "AI기반 방산계약관리"
            ],
            advanced: [
              "방산 첨단소재 MRO를 위한 PBL",
              "방산기업현장실습"
            ]
          },
          {
            key: "logistics",
            tab: "Track 3: 군수 AX 전환",
            subtitle: "군수 운용 데이터 · 에이전트 AI 적용",
            beginner: ["방산AI 입문(교과형/몰입형)"],
            intermediate: ["군수운용 데이터분석 기초", "LLM 인스트럭션", "AI기반 방산수출실무", "AI기반 무기체계론"],
            advanced: ["군수 분야 운용을 위한 에이전트 기술교육", "방산기업현장실습"]
          },
          {
            key: "security",
            tab: "Track 4: 사이버보안",
            subtitle: "방산 AI 보안 · 데이터 보호 실무",
            beginner: ["방산AI 입문(교과형/몰입형)"],
            intermediate: ["방산 AI 보안", "방산 데이터 관리 및 활용", "방산사이버보안개론", "방산SW시스템설계"],
            advanced: ["방산 데이터 보안 및 AX", "방산기업현장실습"]
          }
        ]
      };

      const tabs = [
        { key: "overview", label: "전체(한눈에 정리)" },
        ...curriculumData.tracks.map((track) => ({ key: track.key, label: track.tab }))
      ];

      let activeTab = "overview";

      const tabsRoot = document.getElementById("curriculum-tabs");
      const contentRoot = document.getElementById("curriculum-content");

      function getBadgeClass(isActive) {
        return isActive
          ? "bg-blue-900 text-white border-blue-900"
          : "bg-white text-slate-700 border-slate-300 hover:border-blue-400 hover:text-blue-900";
      }

      function renderTabs() {
        tabsRoot.innerHTML = tabs
          .map(
            (tab) => `
              <button
                type="button"
                data-tab="${tab.key}"
                class="rounded-full border px-4 py-2 text-sm font-semibold transition ${getBadgeClass(tab.key === activeTab)}"
              >
                ${tab.label}
              </button>
            `
          )
          .join("");

        tabsRoot.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            activeTab = button.dataset.tab;
            renderTabs();
            renderContent();
          });
        });
      }

      function renderList(items) {
        return `<ul class="list-disc pl-5 space-y-1 text-sm text-slate-700">${items
          .map((item) => `<li>${item}</li>`)
          .join("")}</ul>`;
      }

      function renderOverview() {
        const overview = curriculumData.overview;
        return `
          <div class="grid gap-4 lg:grid-cols-3">
            <article class="card p-5 lg:col-span-2">
              <h2 class="text-lg font-bold text-blue-950">단계별 로드맵</h2>
              <div class="mt-4 grid gap-3 sm:grid-cols-2">
                ${overview.stageSummary
                  .map(
                    (stage) => `
                      <div class="rounded-xl border border-slate-200 p-4 bg-slate-50">
                        <p class="font-semibold text-slate-900">${stage.stage}</p>
                        <p class="mt-2 text-sm text-slate-600">${stage.desc}</p>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </article>
            <article class="card p-5">
              <h2 class="text-lg font-bold text-blue-950">공통/입문 프로그램</h2>
              <div class="mt-3">${renderList(overview.commonCourses)}</div>
            </article>
            <article class="card p-5 lg:col-span-3">
              <h2 class="text-lg font-bold text-blue-950">운영 트랙 구성</h2>
              <div class="mt-3 grid gap-3 md:grid-cols-2 lg:grid-cols-4">
                ${overview.introTracks
                  .map(
                    (trackName) =>
                      `<div class="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm font-semibold text-blue-900">${trackName}</div>`
                  )
                  .join("")}
              </div>
            </article>
          </div>
        `;
      }

      function renderTrack(track) {
        return `
          <article class="card p-6">
            <h2 class="text-xl font-bold text-blue-950">${track.tab}</h2>
            <p class="mt-2 text-slate-600">${track.subtitle}</p>
            <div class="mt-6 grid gap-4 md:grid-cols-3">
              <section class="rounded-xl border border-slate-200 p-4 bg-slate-50">
                <h3 class="font-bold text-slate-900">초급 과정</h3>
                <div class="mt-3">${renderList(track.beginner)}</div>
              </section>
              <section class="rounded-xl border border-slate-200 p-4 bg-slate-50">
                <h3 class="font-bold text-slate-900">중급 과정</h3>
                <div class="mt-3">${renderList(track.intermediate)}</div>
              </section>
              <section class="rounded-xl border border-slate-200 p-4 bg-slate-50">
                <h3 class="font-bold text-slate-900">고급 과정</h3>
                <div class="mt-3">${renderList(track.advanced)}</div>
              </section>
            </div>
          </article>
        `;
      }

      function renderContent() {
        if (activeTab === "overview") {
          contentRoot.innerHTML = renderOverview();
          return;
        }
        const selectedTrack = curriculumData.tracks.find((track) => track.key === activeTab);
        contentRoot.innerHTML = selectedTrack ? renderTrack(selectedTrack) : "";
      }

      renderTabs();
      renderContent();
    </script>
  </body>
</html>
